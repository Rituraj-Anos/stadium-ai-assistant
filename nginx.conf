server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────
    # CSP written as a single line — nginx does not support newlines inside
    # add_header values; multi-line strings get truncated at the first \n.

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://maps.gstatic.com https://www.gstatic.com https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://firestore.googleapis.com https://generativelanguage.googleapis.com https://translation.googleapis.com wss://*.firebaseio.com; img-src 'self' data: blob: https://maps.googleapis.com https://maps.gstatic.com https://*.googleapis.com https://*.gstatic.com; worker-src blob:; frame-src 'none';" always;

    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets; override Cache-Control for specific location
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
